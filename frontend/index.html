<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Face Recognition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 2rem; color: #fff; margin-bottom: 6px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
    }
    .upload-area {
      border: 2px dashed #3a3d4e;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #6c63ff; }
    .upload-area input { display: none; }
    .upload-area label {
      cursor: pointer;
      font-size: 1.1rem;
      color: #aaa;
      display: block;
    }
    #preview-img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 10px;
      margin-top: 16px;
      display: none;
    }
    .btn {
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 18px;
      width: 100%;
      transition: background 0.2s;
    }
    .btn:hover { background: #574fd6; }
    .btn:disabled { background: #3a3a5a; cursor: not-allowed; }
    .api-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .api-row input {
      flex: 1;
      background: #12141e;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 0.9rem;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 8px;
    }
    .result-item {
      background: #12141e;
      border-radius: 10px;
      padding: 14px 18px;
    }
    .result-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
    .result-value { font-size: 1.1rem; color: #fff; font-weight: 600; margin-top: 4px; }
    .result-value.highlight { color: #6c63ff; font-size: 1.3rem; }
    #crop-section { margin-top: 18px; text-align: center; }
    #crop-section img { max-width: 200px; border-radius: 10px; border: 2px solid #6c63ff; }
    .message-box {
      background: #1e2130;
      border-left: 3px solid #6c63ff;
      border-radius: 6px;
      padding: 10px 14px;
      margin-top: 14px;
      font-size: 0.9rem;
      color: #ccc;
    }
    .spinner {
      display: none;
      width: 24px; height: 24px;
      border: 3px solid #3a3d4e;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Dog Face Recognition</h1>
  <p class="subtitle">Breed Classification + Identity Matching Pipeline</p>

  <div class="card">
    <div class="api-row">
      <input type="text" id="api-url" value="http://127.0.0.1:8000" placeholder="Backend API URL" />
      <span style="color:#888;font-size:0.85rem">API URL</span>
    </div>

    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <label>Click to upload a dog image</label>
      <input type="file" id="file-input" accept="image/*" onchange="onFileSelected(event)" />
      <img id="preview-img" alt="preview" />
    </div>

    <button class="btn" id="run-btn" onclick="runPipeline()" disabled>Run Pipeline</button>
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="card" id="result-card" style="display:none">
    <h3 style="margin-bottom:14px;color:#fff">Results</h3>
    <div class="result-grid">
      <div class="result-item">
        <div class="result-label">Dog Identity</div>
        <div class="result-value highlight" id="r-dogid">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">Breed</div>
        <div class="result-value" id="r-breed">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">Match Score</div>
        <div class="result-value" id="r-match">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">Breed Confidence</div>
        <div class="result-value" id="r-breedconf">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">Face Detected</div>
        <div class="result-value" id="r-face">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">Bounding Box</div>
        <div class="result-value" id="r-bbox" style="font-size:0.85rem">-</div>
      </div>
    </div>

    <div id="crop-section"></div>
    <div class="message-box" id="r-message"></div>
  </div>

  <script>
    let selectedFile = null;

    function onFileSelected(e) {
      selectedFile = e.target.files[0];
      if (!selectedFile) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = document.getElementById('preview-img');
        img.src = ev.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(selectedFile);
      document.getElementById('run-btn').disabled = false;
      document.getElementById('result-card').style.display = 'none';
    }

    async function runPipeline() {
      if (!selectedFile) return;

      const apiUrl = document.getElementById('api-url').value.trim().replace(/\/$/, '');
      const btn     = document.getElementById('run-btn');
      const spinner = document.getElementById('spinner');

      btn.disabled = true;
      spinner.style.display = 'block';
      document.getElementById('result-card').style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const res = await fetch(`${apiUrl}/predict`, {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        displayResults(data);
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    function displayResults(d) {
      document.getElementById('r-dogid').textContent     = d.dog_id      ?? 'Not found';
      document.getElementById('r-breed').textContent     = d.breed       ?? '-';
      document.getElementById('r-match').textContent     = d.match_score != null ? d.match_score.toFixed(4) : '-';
      document.getElementById('r-breedconf').textContent = d.breed_confidence != null ? d.breed_confidence.toFixed(4) : '-';
      document.getElementById('r-face').textContent      = d.face_detected ? 'Yes' : 'No';
      document.getElementById('r-bbox').textContent      = d.bbox ? d.bbox.join(', ') : '-';
      document.getElementById('r-message').textContent   = d.message ?? '';

      const cropSec = document.getElementById('crop-section');
      if (d.crop_image_base64) {
        cropSec.innerHTML = `
          <p style="color:#888;font-size:0.8rem;margin-bottom:8px">Detected face crop</p>
          <img src="data:image/jpeg;base64,${d.crop_image_base64}" alt="face crop" />`;
      } else {
        cropSec.innerHTML = '';
      }

      document.getElementById('result-card').style.display = 'block';
    }
  </script>
</body>
</html>
